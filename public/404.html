<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>VetRemote</title>
    <script>
      // GitHub Pages has no server-side routing, so a direct hit on a
      // client-side route (e.g. /contacts) lands here. This re-encodes the
      // path into a query string and redirects to index.html, which
      // decodes it back (see the matching script in index.html) before
      // react-router-dom takes over — standard SPA-on-GitHub-Pages trick
      // (https://github.com/rafgraph/spa-github-pages).
      //
      // pathSegmentsToKeep = number of leading path segments that are the
      // deployment's base path, not part of the app route. 0 because we
      // serve from the vetremote.ru domain root — set back to 1 if ever
      // reverting to the bare "/vet-remote-commercials" github.io subpath.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
