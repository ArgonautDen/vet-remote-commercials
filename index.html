<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>VetRemote — современная CRM для ветеринарных врачей</title>
    <meta
      name="description"
      content="VetRemote — первая в России ветеринарная CRM с современным интерфейсом. Картотека, календарь, онлайн-запись и анкеты — всё в одном месте."
    />
    <meta name="theme-color" content="#2C4A6E" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function () {
        try {
          if (localStorage.getItem("vetremote-theme") === "brutal") {
            document.documentElement.setAttribute("data-theme", "brutal");
          }
        } catch (e) {}
      })();
    </script>

    <meta property="og:title" content="VetRemote — современная CRM для ветеринарных врачей" />
    <meta
      property="og:description"
      content="Картотека, календарь, онлайн-запись и анкеты — всё в одном месте. Попробуйте бесплатно 14 дней."
    />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
