<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>VetRemote — современная CRM для ветеринарных врачей</title>
    <meta
      name="description"
      content="VetRemote — первая в России ветеринарная CRM с современным интерфейсом. Картотека, календарь, онлайн-запись и анкеты — всё в одном месте."
    />
    <meta name="theme-color" content="#2C4A6E" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:title" content="VetRemote — современная CRM для ветеринарных врачей" />
    <meta
      property="og:description"
      content="Картотека, календарь, онлайн-запись и анкеты — всё в одном месте. Попробуйте бесплатно 14 дней."
    />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Archivo+Black&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Decodes the path re-encoded by public/404.html back into a real URL
      // before react-router-dom mounts, so a direct hit on a client-side
      // route survives a GitHub Pages refresh/deep link.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
